function mkFix(ids){const n=ids.length;const rounds=[];const teams=[...ids];const fixed=teams[0];const rotating=teams.slice(1);
  for(let r=0;r<n-1;r++){const round=[];const cur=[fixed,...rotating];for(let i=0;i<n/2;i++){round.push({home:cur[i],away:cur[n-1-i],result:null,played:false,round:r+1,id:cur[i]+"-"+cur[n-1-i]+"-r"+(r+1)})}rounds.push(...round);rotating.push(rotating.shift())}
  const away=rounds.map(f=>({...f,home:f.away,away:f.home,round:f.round+(n-1),id:f.away+"-"+f.home+"-r"+(f.round+(n-1))}));return[...rounds,...away]}

  const avg=count>0?Math.round(total/count*10):50;const maxB=Math.max(...Object.values(boost),1);

    if(pt==="pace")wt*=(1.15+wSwg*0.1);
    if(isDayNight&&(dewFactor||0)>0.5){wt*=0.85;s4*=1.1}
  }else{
    const wTurn=(w.wsk?.turn||40)/100;const wFlt=(w.wsk?.flight||40)/100;const wVar=(w.wsk?.variation||40)/100;
    wt*=(0.5+bw*0.5+wTurn*0.25+wVar*0.2+wMor-momBoost*0.1);
    d*=(0.85+wVar*0.15+wFlt*0.15);
    if(pt==="spin")wt*=(1.2+wTurn*0.15);if(ph==="mid")wt*=1.1;
    if(isDayNight&&(dewFactor||0)>0.5){wt*=0.75;d*=0.9;s4*=1.15}
  }
  d*=(0.8+wAcc*0.3);
  if(pt==="flat"){s4*=1.15;s6*=1.15;wt*=0.85}
  if(ph==="pp"){s4*=1.1;s6*=1.05;wt*=1.1}
  else if(ph==="mid"){d*=1.05;s4*=0.9;s6*=0.85}
  else{s4*=1.1;s6*=(1.3+bPow*0.3);wt*=1.1;if((b.fit||50)<40)wt*=1.15}
  if(fld==="attacking")wt*=1.1;else if(fld==="defensive"){wt*=0.9;s1*=1.1}
  if(ag==="aggressive"){s4*=1.12;s6*=1.2;wt*=1.15}else if(ag==="defensive"){s4*=0.82;s6*=0.72;wt*=0.88}
  if(ch&&tgt){const r2=120-bl;const rr=r2>0?(tgt-sc)/(r2/6):99;if(rr>12){s6*=1.5;wt*=1.4}else if(rr>9)s6*=1.2}
  if(wk>=5)wt*=(1.35-(b.tmp||50)/99*0.5);if(bc<0.3)wt*=1.2;
  const pitchWear=Math.min(bl/240,0.3);if(!isPacer)wt*=(1+pitchWear*0.5);
  const tot=d+s1+s2+s3+s4+s6+wt+wd+nb;let r=rng.n()*tot,cum=0;
  for(const[t,p]of[["dot",d],["1",s1],["2",s2],["3",s3],["4",s4],["6",s6],["W",wt],["wd",wd],["nb",nb]]){cum+=p;if(r<=cum){let wty="";
    if(t==="W"){const wr=rng.n();const fldC=(b.fsk?.catching||50)/100;
      wty=w.role==="Bowler (Spin)"?(wr<0.3?"lbw":wr<0.5?"st":wr<(0.5+fldC*0.3)?"c":"b"):isPacer?(wr<(0.35+fldC*0.1)?"c":wr<0.6?"b":wr<0.8?"lbw":"c&b"):(wr<(0.3+fldC*0.1)?"c":wr<0.55?"b":wr<0.75?"lbw":"ro")}
    let runs=t==="dot"||t==="W"?0:t==="wd"||t==="nb"?1:parseInt(t);
    if(t==="2"&&fld==="attacking"&&rng.c(0.15))runs=1;
    return{t,wty,runs}}}return{t:"dot",runs:0}}

/* === SUPER OVER === */
function simSuperOver(team1XI,team2XI,pt,isDN,dew){
  const simSO=(batters,bowler)=>{let r=0,w=0,balls=0;
    while(balls<6&&w<2){const stk=batters[Math.min(w,1)];
      const res=simB(stk,bowler,"death",pt,"balanced","aggressive",false,null,r,w,balls,0,isDN,dew);
      r+=res.runs;if(res.t==="W")w++;if(res.t!=="wd"&&res.t!=="nb")balls++}
    return{r,w,balls}};
  const bat1=[team1XI[0],team1XI[1]];const bwl1=team2XI.find(p=>BR.includes(p.role))||team2XI[0];
  const bat2=[team2XI[0],team2XI[1]];const bwl2=team1XI.find(p=>BR.includes(p.role))||team1XI[0];
  const so1=simSO(bat1,bwl1);const so2=simSO(bat2,bwl2);
  return{team1Score:so1,team2Score:so2,winner:so2.r>so1.r?"team2":so2.r<so1.r?"team1":"tie"}}

function addMS(ms,s){return{r:ms.r+s.r,w:ms.w+s.w,m:ms.m+1,bf:(ms.bf||0)+s.bf,bb:(ms.bb||0)+s.bb,rc:(ms.rc||0)+s.rc,hs:Math.max(ms.hs||0,s.r),bw:s.w>0&&s.w>parseInt(ms.bw||"0")?s.w+"/"+s.rc:(ms.bw||"0/0"),f4:(ms.f4||0)+s.f4,s6:(ms.s6||0)+s.s6,ct:ms.ct||0,ratings:[...(ms.ratings||[]),s.rating].slice(-20)}}
function simPS(p,won){const isBat=p.role==="Batsman"||p.role==="WK-Batsman"||p.role==="All-Rounder";const isBowl=BR.includes(p.role)||p.role==="All-Rounder";
  let r=0,bf=0,f4=0,s6=0;
  if(isBat||rng.c(0.7)){const ability=p.bat/100;bf=rng.i(5,Math.round(20+ability*25));const sr=0.8+ability*0.8+rng.f(-0.2,0.3);r=Math.max(0,Math.round(bf*sr));f4=Math.min(Math.floor(r/5),rng.i(0,Math.floor(r/4)));s6=r>25?rng.i(0,Math.floor(r/18)):0}
  let w=0,bb=0,rc=0;
  if(isBowl){bb=rng.i(18,24);const econ=5+((100-p.bowl)/100)*5+rng.f(-1,2);rc=Math.round(bb/6*econ);w=rng.c(p.bowl/150)?rng.i(1,3+(p.bowl>80?1:0)):0}
  let rating=5.0;if(bf>0){if(r>=50)rating+=2.5;else if(r>=30)rating+=1.5;else if(r>=15)rating+=0.5;else if(r<5&&bf>10)rating-=1.0}
  if(bb>0){if(w>=3)rating+=2.5;else if(w>=2)rating+=1.5;else if(w>=1)rating+=0.5;const eco2=rc/(bb/6);if(eco2<=6)rating+=1.0;else if(eco2>=10)rating-=0.5}
  if(won)rating+=0.5;rating=Math.round(Math.max(0,Math.min(10,rating))*10)/10;
  return{r,bf,f4,s6,w,bb,rc,rating}}

/* === DASHBOARD === */
const Dashboard=({gs,setGs,setPh,selP,setSelP})=>{
  const [tab,setTab]=useState("home");
  const myClub=COUNTRIES.flatMap(c=>c.clubs).find(c=>c.id===gs.myClub);const mySq=gs.squads[gs.myClub]||[];
  const allClubs=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs||[];const clubMap={};allClubs.forEach(c=>{clubMap[c.id]=c.nm});
  const fx=gs.fixtures||[];const nextF=fx.find(f=>!f.played&&(f.home===gs.myClub||f.away===gs.myClub));const st=gs.standings||{};const myS=st[gs.myClub]||{w:0,l:0,pts:0};
  const round=nextF?nextF.round:1;
  const tabs=[{id:"home",label:"Home",icon:"\u{1F3E0}"},{id:"squad",label:"Squad",icon:"\u{1F465}"},{id:"tactics",label:"Tactics",icon:"\u{2699}\u{FE0F}"},{id:"fixtures",label:"Fixtures",icon:"\u{1F4C5}"},{id:"table",label:"Table",icon:"\u{1F4CA}"},{id:"stats",label:"Stats",icon:"\u2B50"},{id:"search",label:"Search",icon:"\u{1F50D}"}];
  return <div className="min-h-screen">
    <div className="sticky top-0 z-40 p-3 border-b border-gray-700/30" style={{background:"rgba(6,10,16,0.95)",backdropFilter:"blur(10px)"}}>
      <div className="flex items-center gap-3 mb-3 max-w-5xl mx-auto">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center font-bold gf text-sm" style={{background:myClub?.cl+"22",color:myClub?.cl}}>{myClub?.nm?.charAt(0)}</div>
        <div className="flex-1"><div className="font-bold text-sm gf" style={{color:myClub?.cl}}>{myClub?.nm}</div><div className="text-[10px] text-gray-400">Season {gs.season} | Round {round}</div></div>
        <div className="text-right"><div className="text-xs text-gray-400">Record</div><div className="text-sm font-bold"><span className="text-green-400">{myS.w}W</span> <span className="text-red-400">{myS.l}L</span></div></div></div>
      <Tabs tabs={tabs} active={tab} onChange={setTab}/></div>
    <div className="max-w-5xl mx-auto p-4">
      {tab==="home"&&<HomeTab gs={gs} myClub={myClub} nextF={nextF} myS={myS} mySq={mySq} clubMap={clubMap} allClubs={allClubs} setPh={setPh} setGs={setGs}/>}
      {tab==="squad"&&<SquadTab mySq={mySq} gs={gs} setGs={setGs} myClub={myClub} setSelP={setSelP}/>}
      {tab==="tactics"&&<TacticsTab gs={gs} setGs={setGs} mySq={mySq}/>}
      {tab==="fixtures"&&<FixturesTab fx={fx} myClub={gs.myClub} clubMap={clubMap}/>}

      {tab==="stats"&&<StatsTab gs={gs} clubMap={clubMap} setSelP={setSelP}/>}
      {tab==="search"&&<SearchTab gs={gs} clubMap={clubMap} setSelP={setSelP}/>}
    </div>{selP&&<PlayerProfile p={selP} onClose={()=>setSelP(null)}/>}</div>};

const HomeTab=({gs,myClub,nextF,myS,mySq,clubMap,allClubs,setPh})=>{
  const opp=nextF?allClubs.find(c=>c.id===(nextF.home===gs.myClub?nextF.away:nextF.home)):null;
  return <div className="space-y-4 slide-up">
    {nextF&&opp&&<Card glow={myClub?.cl+"44"}>
      <div className="text-xs text-gray-400 mb-3 gf tracking-wide">NEXT MATCH - ROUND {nextF.round}</div>
      <div className="flex items-center justify-between">
        <div className="text-center flex-1"><div className="w-14 h-14 rounded-xl mx-auto flex items-center justify-center font-bold gf text-xl" style={{background:myClub?.cl+"22",color:myClub?.cl,border:"2px solid "+myClub?.cl+"44"}}>{myClub?.nm?.charAt(0)}</div><div className="text-sm font-bold mt-2 gf" style={{color:myClub?.cl}}>{myClub?.nm}</div></div>
        <div className="text-center px-4"><div className="text-2xl font-bold gf text-gray-500">VS</div><div className="text-[10px] text-gray-500 mt-1">{opp.std}</div></div>
        <div className="text-center flex-1"><div className="w-14 h-14 rounded-xl mx-auto flex items-center justify-center font-bold gf text-xl" style={{background:opp.cl+"22",color:opp.cl,border:"2px solid "+opp.cl+"44"}}>{opp.nm.charAt(0)}</div><div className="text-sm font-bold mt-2 gf" style={{color:opp.cl}}>{opp.nm}</div></div></div>
      <div className="mt-4"><Btn onClick={()=>setPh("prematch")} cl={myClub?.cl} sz="lg" full pulse>Play Match</Btn></div>
    </Card>}

    <Card><div className="text-xs text-gray-400 mb-2 gf">SQUAD OVERVIEW</div>
      <div className="grid grid-cols-4 gap-2 text-center">{[["Players",mySq.length],["Avg OVR",mySq.length>0?Math.round(mySq.reduce((s,p)=>s+p.ov,0)/mySq.length):0],["Injured",mySq.filter(p=>p.inj>0).length],["Form",mySq.length>0?Math.round(mySq.reduce((s,p)=>s+p.form,0)/mySq.length):0]].map(([l,v])=><div key={l}><div className="text-xl font-bold gf">{v}</div><div className="text-[10px] text-gray-400">{l}</div></div>)}</div></Card>
  </div>};

const SquadTab=({mySq,gs,setGs,myClub,setSelP})=>{
  const [sort,setSort]=useState("ov");const [filter,setFilter]=useState("all");
  let list=[...mySq];if(filter!=="all")list=list.filter(p=>filter==="bat"?(p.role==="Batsman"||p.role==="WK-Batsman"):filter==="bowl"?BR.includes(p.role):p.role==="All-Rounder");
  list.sort((a,b)=>sort==="ov"?b.ov-a.ov:sort==="bat"?b.bat-a.bat:sort==="bowl"?b.bowl-a.bowl:sort==="age"?a.age-b.age:0);
  const xi=gs.xi||autoXI(mySq).map(p=>p.id);const toggleXI=(pid)=>{const cur=[...xi];const idx=cur.indexOf(pid);if(idx>=0)cur.splice(idx,1);else if(cur.length<11)cur.push(pid);setGs({...gs,xi:cur})};
  return <div className="space-y-3 slide-up">
    <div className="flex gap-2 flex-wrap">{[["all","All"],["bat","Batters"],["bowl","Bowlers"],["ar","All-R"]].map(([k,l])=><button key={k} onClick={()=>setFilter(k)} className={"px-3 py-1 rounded-lg text-xs font-semibold "+(filter===k?"bg-blue-500/30 text-blue-400":"text-gray-400 hover:text-white")}>{l}</button>)}
      <div className="flex-1"/><select value={sort} onChange={e=>setSort(e.target.value)} className="bg-gray-800 text-xs rounded-lg px-2 py-1 text-gray-300 border border-gray-700/50"><option value="ov">Sort: OVR</option><option value="bat">Batting</option><option value="bowl">Bowling</option><option value="age">Age</option></select></div>
    <div className="text-xs text-gray-400 gf">PLAYING XI ({xi.length}/11) - tap to toggle</div>
    {list.map(p=><div key={p.id} className={"flex items-center gap-2 rounded-lg transition-all "+(xi.includes(p.id)?"bg-blue-500/10 border border-blue-500/30":"border border-transparent")}>
      <button onClick={()=>toggleXI(p.id)} className={"w-7 h-7 rounded-full text-xs font-bold flex items-center justify-center border "+(xi.includes(p.id)?"bg-blue-500 border-blue-400 text-white":"border-gray-600 text-gray-500")}>{xi.includes(p.id)?xi.indexOf(p.id)+1:""}</button>
      <div className="flex-1"><PlayerRow p={p} compact onClick={()=>setSelP(p)}/></div>{p.inj>0&&<Badge text={"INJ "+p.inj} cl="#ef4444" small/>}</div>)}</div>};

const TacticsTab=({gs,setGs,mySq})=>{
  const tac=gs.tactics||{bat:"balanced",field:"balanced",bowl:"balanced"};const upd=(k,v)=>setGs({...gs,tactics:{...tac,[k]:v}});

    <Card><div className="text-sm font-bold gf text-blue-400 mb-3">BATTING APPROACH</div>
      <div className="flex gap-2">{["defensive","balanced","aggressive"].map(v=><Btn key={v} onClick={()=>upd("bat",v)} cl={tac.bat===v?"#3b82f6":"#374151"} sz="sm" full>{v.charAt(0).toUpperCase()+v.slice(1)}</Btn>)}</div></Card>
    <Card><div className="text-sm font-bold gf text-green-400 mb-3">FIELD SETTING</div>
      <div className="flex gap-2">{["defensive","balanced","attacking"].map(v=><Btn key={v} onClick={()=>upd("field",v)} cl={tac.field===v?"#22c55e":"#374151"} sz="sm" full>{v.charAt(0).toUpperCase()+v.slice(1)}</Btn>)}</div></Card>
    <Card><div className="text-sm font-bold gf text-purple-400 mb-3">BOWLING STRATEGY</div>
      <div className="flex gap-2">{["defensive","balanced","aggressive"].map(v=><Btn key={v} onClick={()=>upd("bowl",v)} cl={tac.bowl===v?"#8b5cf6":"#374151"} sz="sm" full>{v.charAt(0).toUpperCase()+v.slice(1)}</Btn>)}</div></Card>

const FixturesTab=({fx,myClub,clubMap})=>{
  const rounds={};fx.forEach(f=>{if(!rounds[f.round])rounds[f.round]=[];rounds[f.round].push(f)});
  return <div className="space-y-3 slide-up">{Object.entries(rounds).map(([r,matches])=><Card key={r}>

        <span className={"flex-1 "+(f.away===myClub?"font-bold":"")}>{clubMap[f.away]||f.away}</span>

const TableTab=({st,allClubs,myClub})=>{
  const rows=allClubs.map(c=>({...c,...(st[c.id]||{w:0,l:0,pts:0,nrr:0,m:0})})).sort((a,b)=>b.pts-a.pts||(b.nrr||0)-(a.nrr||0));
  return <div className="slide-up"><Card><table className="w-full text-xs"><thead><tr className="text-gray-400 border-b border-gray-700/30">
    <th className="text-left py-2 w-8">#</th><th className="text-left">Team</th><th className="text-center">P</th><th className="text-center">W</th><th className="text-center">L</th><th className="text-center">Pts</th><th className="text-center">NRR</th></tr></thead>

const StatsTab=({gs,clubMap,setSelP})=>{
  const allP=gs.players||[];const withStats=allP.filter(p=>p.ms&&p.ms.m>0);
  const topRuns=[...withStats].sort((a,b)=>b.ms.r-a.ms.r).slice(0,10);const topWkts=[...withStats].sort((a,b)=>b.ms.w-a.ms.w).slice(0,10);

        {[48.5,50,51.5].map(x=><rect key={"sb"+x} x={x-0.3} y={73.5} width="0.6" height="2.5" fill="#f5f5dc" rx="0.2" opacity={0.9}/>)}

/* === THE MATCH SCREEN - DRAMATIC OVERHAUL === */
const MatchScreen=({gs,setGs,setPh,selP,setSelP})=>{
  const allClubs=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs||[];
  const nextF=(gs.fixtures||[]).find(f=>!f.played&&(f.home===gs.myClub||f.away===gs.myClub));
  if(!nextF)return null;
  const isHome=nextF.home===gs.myClub;const myClub=allClubs.find(c=>c.id===gs.myClub);const oppId=isHome?nextF.away:nextF.home;const oppClub=allClubs.find(c=>c.id===oppId);
  const mySq=gs.squads[gs.myClub]||[];const oppSq=gs.squads[oppId]||[];
  const myXI=mySq.filter(p=>(gs.xi||[]).includes(p.id)).slice(0,11);const oppXI=autoXI(oppSq);
  const myBat=aiBat(myXI);const oppBat=aiBat(oppXI);
  const batFirst=gs.matchBatFirst;const pt=oppClub?.pt||"balanced";const tac=gs.tactics||{bat:"balanced",field:"balanced",bowl:"balanced"};
  const team1=batFirst?{id:gs.myClub,club:myClub,xi:myXI,bat:myBat,isMy:true}:{id:oppId,club:oppClub,xi:oppXI,bat:oppBat,isMy:false};
  const team2=batFirst?{id:oppId,club:oppClub,xi:oppXI,bat:oppBat,isMy:false}:{id:gs.myClub,club:myClub,xi:myXI,bat:myBat,isMy:true};
  const bowlersOf=(xi)=>xi.filter(p=>BR.includes(p.role)||p.role==="All-Rounder");
  const pickBowler=(bowlers,ovrBowl,lastBwl)=>{const avail=bowlers.filter(p=>(ovrBowl[p.id]||0)<4&&p.id!==lastBwl);if(avail.length===0)return bowlers.find(p=>(ovrBowl[p.id]||0)<4)||bowlers[0];return avail.sort((a,b)=>b.bowl-a.bowl)[rng.c(0.7)?0:rng.i(0,Math.min(2,avail.length-1))]};
  const isDN=gs.matchDN;const dew=isDN?0.6:0;
  const league=COUNTRIES.find(c=>c.id===gs.myCntry)?.league||"T20";
  const findP=(id)=>gs.players.find(p=>p.id===id);

  const initMs=()=>({score:0,wkts:0,balls:0,overs:"0.0",rr:"0.00",extras:0,overRuns:[],thisOver:[],
    batsmen:[{...team1.bat[0],r:0,b:0,f4:0,s6:0,sr:"0.0",onStrike:true},{...team1.bat[1],r:0,b:0,f4:0,s6:0,sr:"0.0",onStrike:false}],
    nextBat:2,bowler:null,ovrBowl:{},lastBwl:null,fow:[],momentum:0,shots:[],commentary:[],keyMoments:[],tweets:[],done:false});

  const [inn,setInn]=useState(1);const [ms,setMs]=useState(initMs);
  const [speed,setSpeed]=useState(0);const [paused,setPaused]=useState(true);
  const [inn1,setInn1]=useState(null);const [finished,setFinished]=useState(false);
  /* Dramatic state */
  const [ballPhase,setBallPhase]=useState("idle");/* idle|runup|suspense|result|celebrate */
  const [preText,setPreText]=useState("");const [resultText,setResultText]=useState("");
  const [effectClass,setEffectClass]=useState("");const [celebText,setCelebText]=useState("");
  const [showStats,setShowStats]=useState(false);const [muted,setMuted]=useState(false);

  const msRef=useRef(ms);msRef.current=ms;const innRef=useRef(inn);innRef.current=inn;const inn1Ref=useRef(inn1);inn1Ref.current=inn1;
  const timerRef=useRef(null);const speedRef=useRef(speed);speedRef.current=speed;

  const batTeam=inn===1?team1:team2;const bowlTeam=inn===1?team2:team1;
  const target=inn===2&&inn1?inn1.score+1:0;

  useEffect(()=>{if(!ms.bowler){const bwls=bowlersOf(bowlTeam.xi);const b=pickBowler(bwls,ms.ovrBowl,ms.lastBwl);setMs(prev=>({...prev,bowler:b}))}
    SFX.startCrowd()},[]);

  const execOneBall=()=>{
    const prev=msRef.current;if(prev.done)return{ms:prev,effect:"",celeb:"",preC:"",resultC:""};
    const m={...prev,batsmen:prev.batsmen.map(b=>({...b})),fow:[...prev.fow],thisOver:[...prev.thisOver],commentary:[...prev.commentary],keyMoments:[...prev.keyMoments],tweets:[...prev.tweets],overRuns:[...prev.overRuns],shots:[...prev.shots],ovrBowl:{...prev.ovrBowl}};
    const stk=m.batsmen.find(b=>b.onStrike);const nonStk=m.batsmen.find(b=>!b.onStrike);
    if(!stk||!m.bowler)return m;
    const ph=gPh(Math.floor(m.balls/6));const ag=batTeam.isMy?tac.bat:"balanced";const fld=batTeam.isMy?tac.field:"balanced";
    const ch=inn===2;const wk=m.wkts;const bl=m.balls;
    const res=simB(stk,m.bowler,ph,pt,fld,ag,ch,ch?target:null,m.score,wk,bl,m.momentum,isDN,dew);
    SFX.setMood(ph);
    const isPacer=["Fast","Fast-Medium","Express","Medium-Fast","Medium","Swing"].includes(m.bowler.bowlStyle);
    const preC=preBowl(m.bowler,isPacer);
    let runs=res.runs;let comm="";const isWide=res.t==="wd";const isNb=res.t==="nb";
    let effect="";let celeb="";let tweet=null;
    if(res.t==="4"){stk.r+=4;stk.f4++;stk.b++;m.score+=4;comm=commFor("s4");m.shots.push({runs:4,angle:rng.f(0,Math.PI*2)});m.momentum=Math.min(50,m.momentum+5);effect="boundary-glow";SFX.batCrack();setTimeout(()=>SFX.crowdRoar(0.8),200);tweet=genTweet("four",{batter:stk.name,league})}
    else if(res.t==="6"){stk.r+=6;stk.s6++;stk.b++;m.score+=6;comm=commFor("s6");m.shots.push({runs:6,angle:rng.f(0,Math.PI*2)});m.momentum=Math.min(50,m.momentum+8);effect="six-glow";SFX.bigHit();tweet=genTweet("six",{batter:stk.name,league})}
    else if(res.t==="W"){stk.b++;comm=(WT[res.wty]||"OUT")+": "+stk.name+" "+stk.r+"("+stk.b+")";m.wkts++;m.fow.push({id:stk.id,name:stk.name,r:stk.r,b:stk.b,score:m.score,wkt:m.wkts});
      m.keyMoments.push({type:"wicket",text:comm,score:m.score+"/"+m.wkts,over:m.overs});m.momentum=Math.max(-50,m.momentum-10);
      effect="shake-it";celeb="OUT!";SFX.wicket();
      tweet=genTweet("wicket",{bowler:m.bowler.name,batter:stk.name,runs:stk.r,balls:stk.b,fielding:bowlTeam.club?.nm||"",league});
      if(m.wkts>=10||m.nextBat>=batTeam.bat.length){m.done=true}else{const nb=batTeam.bat[m.nextBat];m.batsmen=[{...nb,r:0,b:0,f4:0,s6:0,sr:"0.0",onStrike:true},nonStk];m.nextBat++}}
    else if(isWide||isNb){m.score+=1;m.extras++;comm=commFor(isWide?"wd":"nb")}
    else if(res.t==="dot"){stk.b++;comm=commFor("dot");m.momentum=Math.max(-50,m.momentum-1);SFX.dot()}
    else{const r2=parseInt(res.t);stk.r+=r2;stk.b++;m.score+=r2;comm=commFor("s"+res.t);if(r2%2===1){m.batsmen.forEach(b=>{b.onStrike=!b.onStrike})}m.shots.push({runs:r2,angle:rng.f(0,Math.PI*2)});m.momentum=Math.min(50,m.momentum+r2-1);SFX.single()}
    if(!isWide&&!isNb)m.balls++;
    m.batsmen.forEach(b=>{b.sr=b.b>0?(b.r/b.b*100).toFixed(1):"0.0"});
    m.thisOver.push({t:res.t,runs:res.runs,wty:res.wty});
    const ov=Math.floor(m.balls/6);const ballInOv=m.balls%6;m.overs=ov+(ballInOv>0?"."+ballInOv:"");m.rr=m.balls>0?(m.score/(m.balls/6)).toFixed(2):"0.00";
    const runsThisBall=res.t==="4"?4:res.t==="6"?6:res.t==="dot"||res.t==="W"?0:parseInt(res.t)||0;const prevR=stk.r-runsThisBall;
    if(stk.r>=50&&prevR<50&&res.t!=="W"){comm+="\n"+commFor("m50");celeb="FIFTY!";m.keyMoments.push({type:"fifty",text:stk.name+" reaches 50!",score:m.score+"/"+m.wkts,over:m.overs});tweet=genTweet("fifty",{batter:stk.name,league});SFX.crowdRoar(2)}
    if(stk.r>=100&&prevR<100&&res.t!=="W"){comm+="\n"+commFor("m100");celeb="CENTURY!";m.keyMoments.push({type:"century",text:stk.name+" scores a CENTURY!",score:m.score+"/"+m.wkts,over:m.overs});tweet=genTweet("hundred",{batter:stk.name,league});SFX.crowdRoar(3)}
    if(ballInOv===0&&m.balls>0){const thisOvRuns=m.thisOver.reduce((s,b)=>s+b.runs,0);m.overRuns.push(thisOvRuns);m.thisOver=[];
      const bwls=bowlersOf(bowlTeam.xi);const nb2=pickBowler(bwls,m.ovrBowl,m.bowler.id);m.ovrBowl[m.bowler.id]=(m.ovrBowl[m.bowler.id]||0)+1;m.lastBwl=m.bowler.id;m.bowler=nb2;
      m.batsmen.forEach(b=>{b.onStrike=!b.onStrike})}
    if(m.balls>=120)m.done=true;

    if(inn===2&&target>0&&m.balls%18===0&&!m.done){const need=target-m.score;const bleft=120-m.balls;
      const tt=genTweet("tension",{batting:batTeam.club?.nm||"",need:need,balls:bleft,league});if(tt)m.tweets=[tt,...m.tweets.slice(0,8)]}

    return{ms:m,effect,celeb,preC,resultC:comm}};

  /* === DRAMATIC BALL DELIVERY === */
  const deliverBall=(spd)=>{
    if(msRef.current.done)return;

  const startSim=(spd)=>{clearInterval(timerRef.current);setSpeed(spd);speedRef.current=spd;setPaused(false);

  const endInnings=()=>{if(inn===1){const summary={score:ms.score,wkts:ms.wkts,overs:ms.overs,rr:ms.rr,fow:ms.fow,overRuns:ms.overRuns,keyMoments:ms.keyMoments,tweets:ms.tweets};

    const result={t1:team1.id,t2:team2.id,t1s:i1.score,t1w:i1.wkts||0,t2s:i2s,t2w:i2w,winner,margin};
    const ngs={...gs};const fi=ngs.fixtures.findIndex(f=>f.id===nextF.id);if(fi>=0){ngs.fixtures[fi].played=true;ngs.fixtures[fi].result=result}

    [...team1.xi,...team2.xi].forEach(xp=>{const pi=ngs.players.findIndex(p=>p.id===xp.id);if(pi>=0){const won=winner===ngs.players[pi].club;const ps=simPS(ngs.players[pi],won);ngs.players[pi].ms=addMS(ngs.players[pi].ms||{r:0,w:0,m:0},ps);ngs.players[pi].form=cl(ngs.players[pi].form+(ps.rating>=7?rng.i(2,5):ps.rating<=4?rng.i(-5,-2):rng.i(-1,2)));ngs.players[pi].conf=cl(ngs.players[pi].conf+(won?rng.i(1,4):rng.i(-4,-1)))}});
    const allTweets=[...(inn1Ref.current?.tweets||[]),...(msRef.current.tweets||[])];
    const winClub=winner?allClubs.find(c=>c.id===winner):null;const loseClub=winner?(winner===team1.id?team2:team1):null;
    if(winClub)allTweets.push(genTweet("result_win",{winner:winClub.nm,margin,league}));
    if(loseClub)allTweets.push(genTweet("result_lose",{winner:winClub?.nm||"",loser:loseClub.club?.nm||"",margin,league}));
    allTweets.push(genTweet("fan",{league}));allTweets.push(genTweet("fan",{league}));
    ngs.lastResult=result;ngs.lastInn1=inn1Ref.current||inn1;ngs.lastInn2={score:i2s,wkts:i2w,overs:msRef.current.overs};
    ngs.lastKeyMoments=[...(inn1Ref.current?.keyMoments||[]),...(msRef.current.keyMoments||[])];ngs.lastTweets=allTweets;
    SFX.tensionOff();setGs(ngs);setFinished(true);setPh("postmatch")};

  useEffect(()=>{return()=>{clearInterval(timerRef.current)}},[]);

  /* INNINGS BREAK */
  if(ms.done&&!finished){return <div className="min-h-screen match-bg p-4 flex flex-col items-center justify-center">
    <Card className="text-center w-full max-w-md" glow={batTeam.club?.cl+"44"}>

    </Card></div>}

  const ph=gPh(Math.floor(ms.balls/6));const stk=ms.batsmen.find(b=>b.onStrike);const nonStk=ms.batsmen.find(b=>!b.onStrike);

  return <div className={"min-h-screen match-bg "+effectClass}>
    {/* CELEBRATION OVERLAY */}
    {celebText&&<div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none"><div className="text-6xl md:text-8xl font-bold gf out-text" style={{color:celebText==="OUT!"?"#ef4444":"#fbbf24",textShadow:"0 0 40px "+(celebText==="OUT!"?"rgba(239,68,68,0.5)":"rgba(251,191,36,0.5)")}}>{celebText}</div></div>}

              <div className="text-[10px] text-gray-500">({inn===1?ms.overs:(inn1?.overs||"20")} ov)</div></div></div>
          <div className="text-center">
            <div className={"text-[10px] px-3 py-1 rounded-full font-bold gf tracking-wider "+(inn===1?"bg-blue-500/20 text-blue-400":"bg-green-500/20 text-green-400")}>{inn===1?"1ST INNINGS":"2ND INNINGS"}</div>
            <div className={"text-[10px] mt-1 px-3 py-1 rounded-full font-bold gf "+(ph==="pp"?"bg-yellow-500/20 text-yellow-400":ph==="mid"?"bg-blue-500/20 text-blue-400":"bg-red-500/20 text-red-400")}>{ph==="pp"?"POWERPLAY":ph==="mid"?"MIDDLE":"DEATH"}</div>
          </div>
          <div className="flex items-center gap-3 flex-1 justify-end">
            <div className="text-right"><div className="text-xs gf" style={{color:team2.club?.cl}}>{team2.club?.nm}</div>
              <div className={"text-3xl font-bold gf "+(inn===2?"text-white":"text-gray-400")}>{inn===2?ms.score:"-"}{inn===2&&<span className="text-lg text-gray-500">/{ms.wkts}</span>}</div>
              {inn===2&&target>0&&<div className="text-[10px] text-yellow-400 font-bold">Need {Math.max(0,target-ms.score)} off {Math.max(0,120-ms.balls)}</div>}</div>
            <div className="w-10 h-10 rounded-lg flex items-center justify-center font-bold gf" style={{background:team2.club?.cl+"22",color:team2.club?.cl}}>{team2.club?.nm?.charAt(0)}</div></div>

    <div className="max-w-5xl mx-auto p-4 space-y-4">

            {paused?<><button onClick={playOneBall} className="game-btn text-xs" style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",padding:"8px 16px"}}>&#x1F3CF; Ball</button>

/* === POST-MATCH EXPERIENCE === */
const PostMatch=({gs,setGs,setPh,selP,setSelP})=>{

        {i1?.overRuns&&<Card>
          <div className="text-xs text-gray-400 gf tracking-wide mb-2">MANHATTAN</div>
          <div className="flex items-end gap-0.5 h-24">{i1.overRuns.map((r2,i)=><div key={i} className="flex-1 rounded-t" style={{height:Math.max(4,r2*6),background:t1c?.cl||"#3b82f6",opacity:0.7}} title={"Over "+(i+1)+": "+r2+" runs"}/>)}</div>
          <div className="text-[10px] text-gray-600 mt-1">Overs (1st Innings)</div>
        </Card>}
      </div>}

      {/* HIGHLIGHTS TAB */}
      {tab==="highlights"&&<div className="space-y-3 slide-up">
        {kms.length===0&&<div className="text-center text-gray-500 py-8">No key moments recorded</div>}
        {kms.map((km,i)=><Card key={i} glow={km.type==="wicket"?"#ef444433":km.type==="century"?"#fbbf2433":"#22c55e33"}>
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg" style={{background:km.type==="wicket"?"#ef444422":"#22c55e22"}}>{km.type==="wicket"?"\u274C":km.type==="century"?"\u{1F4AF}":"\u2B50"}</div>
            <div className="flex-1"><div className={"font-bold text-sm "+(km.type==="wicket"?"text-red-400":km.type==="century"?"text-yellow-400":"text-green-400")}>{km.text}</div>
              <div className="text-[10px] text-gray-500">{km.score} | Over {km.over}</div></div>
          </div>
        </Card>)}
      </div>}

      {/* SOCIAL TAB */}
      {tab==="social"&&<div className="space-y-3 slide-up">
        {tweets.length===0&&<div className="text-center text-gray-500 py-8">No tweets</div>}
        {tweets.map((t,i)=><TweetCard key={i} tweet={t} delay={i*0.05}/>)}
      </div>}

      {/* PRESS CONFERENCE TAB */}
      {tab==="conference"&&<div className="space-y-4 slide-up">
        <Card glow={isMyWin?"#22c55e33":"#ef444433"}>
          <div className="flex items-center gap-3 mb-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg" style={{background:"#3b82f622"}}>&#x1F3A4;</div>
            <div><div className="text-sm font-bold gf">YOUR CAPTAIN</div><div className="text-[10px] text-gray-400">Post-Match Press Conference</div></div>
          </div>
          <div className="text-sm italic text-gray-300 leading-relaxed">
            {!confDone?<TypewriterText text={'"'+confQuote+'"'} speed={30} onDone={()=>setConfDone(true)}/>:<span>"{confQuote}"</span>}
          </div>
        </Card>
        <Card glow="#6b728033">
          <div className="flex items-center gap-3 mb-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg" style={{background:"#f59e0b22"}}>&#x1F3A4;</div>
            <div><div className="text-sm font-bold gf">OPPOSITION CAPTAIN</div><div className="text-[10px] text-gray-400">Post-Match Press Conference</div></div>
          </div>
          <div className="text-sm italic text-gray-300 leading-relaxed">"{oppConfQuote}"</div>
        </Card>
        {/* Pundit analysis */}
        <Card>
          <div className="flex items-center gap-3 mb-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg" style={{background:"#06b6d422"}}>&#x1F4CA;</div>
            <div><div className="text-sm font-bold gf text-cyan-400">EXPERT ANALYSIS</div></div>
          </div>
          <div className="text-sm text-gray-300">{isMyWin?"A clinical performance. The batting was disciplined and the bowling unit delivered under pressure. This win will boost confidence for the rest of the tournament.":isTie?"What a contest! Neither team deserved to lose. Both sides showed incredible fight and determination.":"A tough day at the office. The team needs to address some key areas - particularly their approach in the middle overs. But it is a long tournament and there is time to recover."}</div>
        </Card>
      </div>}

      {/* CONTINUE BUTTON */}
      <div className="text-center pt-4 pb-8">
        <Btn onClick={()=>{
          const ngs={...gs};
          /* Sim other matches */
          const round=(ngs.fixtures||[]).filter(f=>!f.played).slice(0,allClubs.length/2-1);
          round.forEach(f=>{
            if(f.home===ngs.myClub||f.away===ngs.myClub)return;
            const h=ngs.squads[f.home]||[];const a=ngs.squads[f.away]||[];
            if(h.length<11||a.length<11)return;
            const hxi=autoXI(h);const axi=autoXI(a);const s1=rng.i(100,200);const w1=rng.i(3,10);const s2=rng.i(80,s1+20);const w2=rng.i(3,10);
            const w=s2>s1?f.away:s2<s1?f.home:rng.c(0.5)?f.home:f.away;
            f.played=true;f.result={t1:f.home,t2:f.away,t1s:s1,t1w:w1,t2s:s2,t2w:w2,winner:w,margin:w===f.home?(s1-s2)+" runs":(10-w2)+" wickets"};
            if(!ngs.standings)ngs.standings={};allClubs.forEach(c2=>{if(!ngs.standings[c2.id])ngs.standings[c2.id]={w:0,l:0,pts:0,nrr:0,m:0}});
            ngs.standings[f.home].m++;ngs.standings[f.away].m++;
            if(w===f.home){ngs.standings[f.home].w++;ngs.standings[f.home].pts+=2;ngs.standings[f.away].l++}
            else{ngs.standings[f.away].w++;ngs.standings[f.away].pts+=2;ngs.standings[f.home].l++}
          });
          /* Check if season is over */
          const remaining=ngs.fixtures.filter(f=>!f.played&&(f.home===ngs.myClub||f.away===ngs.myClub));
          if(remaining.length===0){setGs(ngs);setPh("seasonend")}else{setGs(ngs);setPh("dash")}
        }} cl={isMyWin?"#22c55e":"#3b82f6"} sz="lg" pulse>CONTINUE</Btn>
      </div>
    </div>
    {selP&&<PlayerProfile p={selP} onClose={()=>setSelP(null)}/>}
  </div>};

/* === SEASON END === */
const SeasonEnd=({gs,setGs,setPh,selP,setSelP})=>{
  const allClubs=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs||[];
  const st=gs.standings||{};const sorted=allClubs.map(c=>({...c,...(st[c.id]||{w:0,l:0,pts:0,nrr:0,m:0})})).sort((a,b)=>b.pts-a.pts||(b.nrr||0)-(a.nrr||0));
  const myPos=sorted.findIndex(c=>c.id===gs.myClub)+1;const champ=sorted[0];const isChamp=champ?.id===gs.myClub;
  const allP=gs.players||[];const seasonBat=allP.filter(p=>p.ms&&p.ms.r>0).sort((a,b)=>(b.ms.r||0)-(a.ms.r||0));
  const seasonBowl=allP.filter(p=>p.ms&&p.ms.w>0).sort((a,b)=>(b.ms.w||0)-(a.ms.w||0));
  const findP=(id)=>gs.players.find(p=>p.id===id);
  const [tab,setTab]=useState("standings");

  return <div className="min-h-screen match-bg p-4">
    <div className="max-w-3xl mx-auto space-y-4">
      <div className="text-center slide-up">
        <div className="text-sm gf text-gray-400 tracking-widest mb-2">SEASON COMPLETE</div>
        {isChamp?<div className="text-4xl font-bold gf text-yellow-400 score-pop">&#x1F3C6; CHAMPIONS! &#x1F3C6;</div>
          :<div className="text-2xl font-bold gf text-gray-300">Season Over - Finished #{myPos}</div>}
      </div>

      <Tabs tabs={[{id:"standings",label:"Standings",icon:"\u{1F4CA}"},{id:"awards",label:"Awards",icon:"\u{1F3C6}"},{id:"stats",label:"Stats",icon:"\u2B50"}]} active={tab} onChange={setTab}/>

      {tab==="standings"&&<div className="space-y-1 slide-up">
        {sorted.map((c,i)=><Card key={c.id} glow={c.id===gs.myClub?c.cl+"44":null}>
          <div className="flex items-center gap-3">
            <div className={"w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold gf "+(i===0?"bg-yellow-500/20 text-yellow-400":i<4?"bg-blue-500/20 text-blue-400":"bg-gray-700/30 text-gray-400")}>{i+1}</div>
            <div className="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm" style={{background:c.cl+"22",color:c.cl}}>{c.nm.charAt(0)}</div>
            <div className="flex-1"><div className="text-sm font-bold" style={{color:c.id===gs.myClub?c.cl:"white"}}>{c.nm}</div></div>
            <div className="text-xs text-gray-400 w-8 text-center">{c.m||0}</div>
            <div className="text-xs text-green-400 w-8 text-center">{c.w||0}</div>
            <div className="text-xs text-red-400 w-8 text-center">{c.l||0}</div>
            <div className="text-sm font-bold gf w-10 text-center text-yellow-400">{c.pts||0}</div>
            <div className="text-xs text-gray-500 w-12 text-right">{(c.nrr||0).toFixed(3)}</div>
          </div>
        </Card>)}
        <div className="flex gap-4 text-[10px] text-gray-600 justify-end px-4"><span>M</span><span className="text-green-400">W</span><span className="text-red-400">L</span><span className="text-yellow-400">PTS</span><span>NRR</span></div>
      </div>}

      {tab==="awards"&&<div className="space-y-4 slide-up">
        {[["\u{1F3C6} Champion",champ?.nm,champ?.cl,null],["\u{1F3CF} Golden Bat",seasonBat[0]?.name,"#fbbf24",seasonBat[0]?.id],["\u26BE Golden Ball",seasonBowl[0]?.name,"#8b5cf6",seasonBowl[0]?.id]].map(([title,name,cl,pid],i)=><Card key={i} glow={cl+"33"}>
          <div className="text-center"><div className="text-xs gf tracking-widest mb-1" style={{color:cl}}>{title}</div>
            <div className="text-xl font-bold gf">{pid?<span className="cursor-pointer hover:underline" onClick={()=>setSelP(findP(pid))}>{name}</span>:(name||"N/A")}</div>
            {i===1&&seasonBat[0]&&<div className="text-sm text-gray-400">{seasonBat[0].ms?.r} runs</div>}
            {i===2&&seasonBowl[0]&&<div className="text-sm text-gray-400">{seasonBowl[0].ms?.w} wickets</div>}
          </div>
        </Card>)}
      </div>}

      {tab==="stats"&&<div className="space-y-4 slide-up">
        <Card><div className="text-xs text-gray-400 gf tracking-wide mb-2">TOP RUN SCORERS</div>
          {seasonBat.slice(0,10).map((p,i)=><div key={p.id} className="flex items-center gap-2 py-1 border-b border-gray-700/20">
            <span className="text-xs text-gray-500 w-6">{i+1}</span><span className="text-sm flex-1 cursor-pointer hover:underline" onClick={()=>setSelP(findP(p.id))}>{p.name}</span>
            <span className="text-sm font-bold gf text-green-400">{p.ms?.r||0}</span></div>)}
        </Card>
        <Card><div className="text-xs text-gray-400 gf tracking-wide mb-2">TOP WICKET TAKERS</div>
          {seasonBowl.slice(0,10).map((p,i)=><div key={p.id} className="flex items-center gap-2 py-1 border-b border-gray-700/20">
            <span className="text-xs text-gray-500 w-6">{i+1}</span><span className="text-sm flex-1 cursor-pointer hover:underline" onClick={()=>setSelP(findP(p.id))}>{p.name}</span>
            <span className="text-sm font-bold gf text-purple-400">{p.ms?.w||0}</span></div>)}
        </Card>
      </div>}

      <div className="text-center pt-4 pb-8">
        <Btn onClick={()=>{
          /* New season - reset fixtures, standings, player stats, age players */
          const ngs={...gs};ngs.season=(ngs.season||1)+1;
          ngs.players=ngs.players.map(p=>({...p,age:p.age+1,ms:{r:0,w:0,m:0,bf:0,bb:0,rc:0,f4:0,s6:0,hs:0,bw:"0/0"},
            form:cl(p.form+rng.i(-5,5)),mor:cl(p.mor+rng.i(-3,3)),
            bat:cl(p.age<25?p.bat+rng.i(0,3):p.age>32?p.bat-rng.i(0,3):p.bat+rng.i(-1,1)),
            bowl:cl(p.age<25?p.bowl+rng.i(0,3):p.age>32?p.bowl-rng.i(0,3):p.bowl+rng.i(-1,1)),
            inj:0}));
          ngs.fixtures=mkFix(allClubs.map(c=>c.id));ngs.standings={};
          allClubs.forEach(c=>{ngs.standings[c.id]={w:0,l:0,pts:0,nrr:0,m:0}});
          ngs.xi=autoXI(ngs.squads[ngs.myClub]||[]).map(p=>p.id);
          saveG(ngs);setGs(ngs);setPh("dash")
        }} cl="#fbbf24" sz="lg" pulse>{isChamp?"DEFEND YOUR TITLE - SEASON "+((gs.season||1)+1):"NEW SEASON "+((gs.season||1)+1)}</Btn>
      </div>
    </div>
    {selP&&<PlayerProfile p={selP} onClose={()=>setSelP(null)}/>}
  </div>};

/* === MAIN APP COMPONENT === */
const App=()=>{
  const [ph,setPh]=useState("title");
  const [gs,setGs]=useState({myCntry:null,myClub:null,players:[],squads:{},fixtures:[],standings:{},tactics:{bat:"balanced",field:"balanced",bowl:"balanced"},xi:[],season:1});
  const [selP,setSelP]=useState(null);

  /* Initialize game */
  const startNewGame=(cntry,clubId)=>{
    SFX.init();
    const country=COUNTRIES.find(c=>c.id===cntry);if(!country)return;
    const allPlayers=[];const sqByClub={};
    const roleTemplate=["Batsman","Batsman","Batsman","Batsman","WK-Batsman","All-Rounder","All-Rounder","All-Rounder","Bowler (Fast)","Bowler (Fast)","Bowler (Fast)","Bowler (Medium)","Bowler (Spin)","Bowler (Spin)","Batsman","Batsman"];
    country.clubs.forEach(club=>{
      const sq=[];for(let i=0;i<16;i++){const p=mp(cntry,club.id,roleTemplate[i]);allPlayers.push(p);sq.push(p)}
      sqByClub[club.id]=sq;
    });
    const fixtures=mkFix(country.clubs.map(c=>c.id));
    const standings={};country.clubs.forEach(c=>{standings[c.id]={w:0,l:0,pts:0,nrr:0,m:0}});
    const mySq=sqByClub[clubId]||[];
    const xi=autoXI(mySq).map(p=>p.id);
    const newGs={myCntry:cntry,myClub:clubId,players:allPlayers,squads:sqByClub,fixtures,standings,tactics:{bat:"balanced",field:"balanced",bowl:"balanced"},xi,season:1};
    saveG(newGs);setGs(newGs);
  };

  const loadSaved=()=>{const saved=loadG();if(saved){setGs(saved);setPh("dash");return true}return false};

  /* Phase routing */
  if(ph==="title")return <TitleScreen onNew={()=>setPh("country")} onLoad={()=>{if(loadSaved())setPh("dash")}} canLoad={!!loadG()}/>;
  if(ph==="country")return <CountrySelect onSelect={(id)=>{setGs(prev=>({...prev,myCntry:id}));setPh("club")}}/>;
  if(ph==="club")return <ClubSelect country={gs.myCntry} onSelect={(id)=>{startNewGame(gs.myCntry,id);setPh("reveal")}} onBack={()=>setPh("country")}/>;
  if(ph==="reveal"){const mySq=(gs.squads[gs.myClub]||[]);const club=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs.find(c2=>c2.id===gs.myClub);
    return <SquadReveal squad={mySq} club={club} onContinue={()=>setPh("dash")}/>;
  }
  if(ph==="dash")return <Dashboard gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="prematch"){
    const allClubs=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs||[];
    const nextF=(gs.fixtures||[]).find(f=>!f.played&&(f.home===gs.myClub||f.away===gs.myClub));
    if(!nextF)return <Dashboard gs={gs} setGs={setGs} setPh={setPh} selP={selP} setSelP={setSelP}/>;
    const isHome=nextF.home===gs.myClub;const oppId=isHome?nextF.away:nextF.home;
    const myClub=allClubs.find(c=>c.id===gs.myClub);const oppClub=allClubs.find(c=>c.id===oppId);
    return <PreMatch gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} myClub={myClub} oppClub={oppClub}/>;
  }
  if(ph==="match")return <MatchScreen gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="postmatch")return <PostMatch gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="seasonend")return <SeasonEnd gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  return <TitleScreen onNew={()=>setPh("country")} onLoad={()=>{if(loadSaved())setPh("dash")}}/>;
};


/* === RENDER === */
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script></body></html>
