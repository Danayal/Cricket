function mkFix(ids){const n=ids.length;const rounds=[];const teams=[...ids];const fixed=teams[0];const rotating=teams.slice(1);

  const away=rounds.map(f=>({...f,home:f.away,away:f.home,round:f.round+(n-1),id:f.away+"-"+f.home+"-r"+(f.round+(n-1))}));return[...rounds,...away]}

  if(ch&&tgt){const r2=120-bl;const rr=r2>0?(tgt-sc)/(r2/6):99;if(rr>12){s6*=1.5;wt*=1.4}else if(rr>9)s6*=1.2}

    if(t==="W"){const wr=rng.n();const fldC=(b.fsk?.catching||50)/100;
      wty=w.role==="Bowler (Spin)"?(wr<0.3?"lbw":wr<0.5?"st":wr<(0.5+fldC*0.3)?"c":"b"):isPacer?(wr<(0.35+fldC*0.1)?"c":wr<0.6?"b":wr<0.8?"lbw":"c&b"):(wr<(0.3+fldC*0.1)?"c":wr<0.55?"b":wr<0.75?"lbw":"ro")}

/* === SUPER OVER === */
function simSuperOver(team1XI,team2XI,pt,isDN,dew){
  const simSO=(batters,bowler)=>{let r=0,w=0,balls=0;
    while(balls<6&&w<2){const stk=batters[Math.min(w,1)];
      const res=simB(stk,bowler,"death",pt,"balanced","aggressive",false,null,r,w,balls,0,isDN,dew);
      r+=res.runs;if(res.t==="W")w++;if(res.t!=="wd"&&res.t!=="nb")balls++}
    return{r,w,balls}};
  const bat1=[team1XI[0],team1XI[1]];const bwl1=team2XI.find(p=>BR.includes(p.role))||team2XI[0];
  const bat2=[team2XI[0],team2XI[1]];const bwl2=team1XI.find(p=>BR.includes(p.role))||team1XI[0];
  const so1=simSO(bat1,bwl1);const so2=simSO(bat2,bwl2);
  return{team1Score:so1,team2Score:so2,winner:so2.r>so1.r?"team2":so2.r<so1.r?"team1":"tie"}}

function addMS(ms,s){return{r:ms.r+s.r,w:ms.w+s.w,m:ms.m+1,bf:(ms.bf||0)+s.bf,bb:(ms.bb||0)+s.bb,rc:(ms.rc||0)+s.rc,hs:Math.max(ms.hs||0,s.r),bw:s.w>0&&s.w>parseInt(ms.bw||"0")?s.w+"/"+s.rc:(ms.bw||"0/0"),f4:(ms.f4||0)+s.f4,s6:(ms.s6||0)+s.s6,ct:ms.ct||0,ratings:[...(ms.ratings||[]),s.rating].slice(-20)}}
function simPS(p,won){const isBat=p.role==="Batsman"||p.role==="WK-Batsman"||p.role==="All-Rounder";const isBowl=BR.includes(p.role)||p.role==="All-Rounder";
  let r=0,bf=0,f4=0,s6=0;
  if(isBat||rng.c(0.7)){const ability=p.bat/100;bf=rng.i(5,Math.round(20+ability*25));const sr=0.8+ability*0.8+rng.f(-0.2,0.3);r=Math.max(0,Math.round(bf*sr));f4=Math.min(Math.floor(r/5),rng.i(0,Math.floor(r/4)));s6=r>25?rng.i(0,Math.floor(r/18)):0}
  let w=0,bb=0,rc=0;
  if(isBowl){bb=rng.i(18,24);const econ=5+((100-p.bowl)/100)*5+rng.f(-1,2);rc=Math.round(bb/6*econ);w=rng.c(p.bowl/150)?rng.i(1,3+(p.bowl>80?1:0)):0}
  let rating=5.0;if(bf>0){if(r>=50)rating+=2.5;else if(r>=30)rating+=1.5;else if(r>=15)rating+=0.5;else if(r<5&&bf>10)rating-=1.0}
  if(bb>0){if(w>=3)rating+=2.5;else if(w>=2)rating+=1.5;else if(w>=1)rating+=0.5;const eco2=rc/(bb/6);if(eco2<=6)rating+=1.0;else if(eco2>=10)rating-=0.5}
  if(won)rating+=0.5;rating=Math.round(Math.max(0,Math.min(10,rating))*10)/10;
  return{r,bf,f4,s6,w,bb,rc,rating}}

/* === CRICKET GROUND (Three.js) === */
const CricketPitch3D=({ballPhase,lastResult,shotAngle,fieldSet,homeColor,awayColor,phaseId})=>{
  const mountRef=useRef(null);
  const refs=useRef({});
  const [size,setSize]=useState({w:320,h:320});

  useEffect(()=>{
    if(!mountRef.current||!window.THREE)return;
    const THREE=window.THREE;
    const el=mountRef.current;const w=el.clientWidth;const h=Math.max(240,Math.min(420,w));
    setSize({w,h});
    const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a1628);scene.fog=new THREE.Fog(0x0a1628,60,140);
    const camera=new THREE.PerspectiveCamera(45,w/h,0.5,300);camera.position.set(0,22,38);camera.lookAt(0,0,0);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});renderer.setPixelRatio(window.devicePixelRatio||1);renderer.setSize(w,h);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;el.innerHTML="";el.appendChild(renderer.domElement);
    /* Lights */
    const amb=new THREE.AmbientLight(0xffffff,0.55);scene.add(amb);
    const sun=new THREE.DirectionalLight(0xfff5dd,0.9);sun.position.set(-25,40,20);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.left=-50;sun.shadow.camera.right=50;sun.shadow.camera.top=50;sun.shadow.camera.bottom=-50;scene.add(sun);
    const rim=new THREE.PointLight(0x88aaff,0.35,120);rim.position.set(30,20,-30);scene.add(rim);
    /* Ground oval */
    const fieldGeo=new THREE.CircleGeometry(45,96);fieldGeo.rotateX(-Math.PI/2);
    const fieldMat=new THREE.MeshStandardMaterial({color:0x1f7a1f,roughness:0.85});
    const field=new THREE.Mesh(fieldGeo,fieldMat);field.receiveShadow=true;scene.add(field);
    /* Mow stripes */
    const stripesGroup=new THREE.Group();
    for(let i=-44;i<=44;i+=4){const g=new THREE.PlaneGeometry(1.8,90);g.rotateX(-Math.PI/2);const m=new THREE.MeshBasicMaterial({color:i%8===0?0x267a26:0x1a6e1a,transparent:true,opacity:0.35});const s=new THREE.Mesh(g,m);s.position.set(i,0.02,0);stripesGroup.add(s)}
    scene.add(stripesGroup);

        <Card><div className="text-xs text-gray-400 gf tracking-wide mb-2">TOP WICKET TAKERS</div>
          {seasonBowl.slice(0,10).map((p,i)=><div key={p.id} className="flex items-center gap-2 py-1 border-b border-gray-700/20">
            <span className="text-xs text-gray-500 w-6">{i+1}</span><span className="text-sm flex-1 cursor-pointer hover:underline" onClick={()=>setSelP(findP(p.id))}>{p.name}</span>
            <span className="text-sm font-bold gf text-purple-400">{p.ms?.w||0}</span></div>)}
        </Card>
      </div>}

      <div className="text-center pt-4 pb-8">
        <Btn onClick={()=>{
          /* New season - reset fixtures, standings, player stats, age players */
          const ngs={...gs};
          if(isChamp){ngs.titles=[...(gs.titles||[]),{season:gs.season||1,league:COUNTRIES.find(c=>c.id===gs.myCntry)?.league}];ngs.rep=cl((gs.rep||50)+8,0,100);ngs.board=cl((gs.board||60)+15,0,100)}
          else if(myPos<=4){ngs.rep=cl((gs.rep||50)+3,0,100)}
          else{ngs.board=cl((gs.board||60)-10,0,100)}
          const ach2={...(ngs.achievements||{})};ACHIEVEMENTS.forEach(a=>{if(!ach2[a.id]&&a.check(ngs))ach2[a.id]=true});ngs.achievements=ach2;
          ngs.season=(ngs.season||1)+1;
          ngs.players=ngs.players.map(p=>({...p,age:p.age+1,ms:{r:0,w:0,m:0,bf:0,bb:0,rc:0,f4:0,s6:0,hs:0,bw:"0/0"},
            form:cl(p.form+rng.i(-5,5)),mor:cl(p.mor+rng.i(-3,3)),
            bat:cl(p.age<25?p.bat+rng.i(0,3):p.age>32?p.bat-rng.i(0,3):p.bat+rng.i(-1,1)),
            bowl:cl(p.age<25?p.bowl+rng.i(0,3):p.age>32?p.bowl-rng.i(0,3):p.bowl+rng.i(-1,1)),
            inj:0}));
          ngs.fixtures=mkFix(allClubs.map(c=>c.id));ngs.standings={};
          allClubs.forEach(c=>{ngs.standings[c.id]={w:0,l:0,pts:0,nrr:0,m:0}});
          ngs.xi=autoXI(ngs.squads[ngs.myClub]||[]).map(p=>p.id);
          saveG(ngs);setGs(ngs);setPh("dash")
        }} cl="#fbbf24" sz="lg" pulse>{isChamp?"DEFEND YOUR TITLE - SEASON "+((gs.season||1)+1):"NEW SEASON "+((gs.season||1)+1)}</Btn>
      </div>
    </div>
    {selP&&<PlayerProfile p={selP} onClose={()=>setSelP(null)}/>}
  </div>};

/* === MAIN APP COMPONENT === */
const App=()=>{
  const [ph,setPh]=useState("title");
  const [gs,setGs]=useState({myCntry:null,myClub:null,players:[],squads:{},fixtures:[],standings:{},tactics:{bat:"balanced",field:"balanced",bowl:"balanced"},xi:[],season:1});
  const [selP,setSelP]=useState(null);

  /* Initialize game */
  const startNewGame=(cntry,clubId)=>{
    SFX.init();
    const country=COUNTRIES.find(c=>c.id===cntry);if(!country)return;
    const allPlayers=[];const sqByClub={};
    const roleTemplate=["Batsman","Batsman","Batsman","Batsman","WK-Batsman","All-Rounder","All-Rounder","All-Rounder","Bowler (Fast)","Bowler (Fast)","Bowler (Fast)","Bowler (Medium)","Bowler (Spin)","Bowler (Spin)","Batsman","Batsman"];
    country.clubs.forEach(club=>{
      const sq=[];for(let i=0;i<16;i++){const p=mp(cntry,club.id,roleTemplate[i]);allPlayers.push(p);sq.push(p)}
      sqByClub[club.id]=sq;
    });
    const fixtures=mkFix(country.clubs.map(c=>c.id));
    const standings={};country.clubs.forEach(c=>{standings[c.id]={w:0,l:0,pts:0,nrr:0,m:0}});
    const mySq=sqByClub[clubId]||[];
    const xi=autoXI(mySq).map(p=>p.id);
    const newGs={myCntry:cntry,myClub:clubId,players:allPlayers,squads:sqByClub,fixtures,standings,tactics:{bat:"balanced",field:"balanced",bowl:"balanced"},xi,season:1};
    saveG(newGs);setGs(newGs);
  };

  const loadSaved=()=>{const saved=loadG();if(saved){setGs(saved);setPh("dash");return true}return false};

  /* Phase routing */
  if(ph==="title")return <TitleScreen onNew={()=>setPh("country")} onLoad={()=>{if(loadSaved())setPh("dash")}} canLoad={!!loadG()}/>;
  if(ph==="country")return <CountrySelect onSelect={(id)=>{setGs(prev=>({...prev,myCntry:id}));setPh("club")}}/>;
  if(ph==="club")return <ClubSelect country={gs.myCntry} onSelect={(id)=>{startNewGame(gs.myCntry,id);setPh("reveal")}} onBack={()=>setPh("country")}/>;
  if(ph==="reveal"){const mySq=(gs.squads[gs.myClub]||[]);const club=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs.find(c2=>c2.id===gs.myClub);
    return <SquadReveal squad={mySq} club={club} onContinue={()=>setPh("dash")}/>;
  }
  if(ph==="dash")return <Dashboard gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="prematch"){
    const allClubs=COUNTRIES.find(c=>c.id===gs.myCntry)?.clubs||[];
    const nextF=(gs.fixtures||[]).find(f=>!f.played&&(f.home===gs.myClub||f.away===gs.myClub));
    if(!nextF)return <Dashboard gs={gs} setGs={setGs} setPh={setPh} selP={selP} setSelP={setSelP}/>;
    const isHome=nextF.home===gs.myClub;const oppId=isHome?nextF.away:nextF.home;
    const myClub=allClubs.find(c=>c.id===gs.myClub);const oppClub=allClubs.find(c=>c.id===oppId);
    return <PreMatch gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} myClub={myClub} oppClub={oppClub}/>;
  }
  if(ph==="match")return <MatchScreen gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="postmatch")return <PostMatch gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  if(ph==="seasonend")return <SeasonEnd gs={gs} setGs={(ngs)=>{setGs(ngs);saveG(ngs)}} setPh={setPh} selP={selP} setSelP={setSelP}/>;
  return <TitleScreen onNew={()=>setPh("country")} onLoad={()=>{if(loadSaved())setPh("dash")}}/>;
};


/* === RENDER === */
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script></body></html>
